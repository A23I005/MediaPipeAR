<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking AR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <video id="webcam" autoplay playsinline></video>

    <div id="debug-info">システム初期化中...</div>

    <div id="start-ui">
        <div class="card">
            <h2>ハンドトラッキングAR</h2>
            <p>カメラを許可すると、手のひらから恐竜が飛び出します！</p>
            <button id="start-btn">カメラを許可してARをスタート</button>
        </div>
    </div>

    <script>
        window.addEventListener('error', (event) => {
            const debugElement = document.getElementById('debug-info');
            if (debugElement) {
                // エラーが発生したら、即座に理由を画面に赤文字で出します
                debugElement.innerText = `【エラー】\n${event.message}\n(${event.filename ? event.filename.split('/').pop() : ''}:${event.lineno})`;
                debugElement.style.color = "#ff4444";
            }
        });
        window.addEventListener('unhandledrejection', (event) => {
            const debugElement = document.getElementById('debug-info');
            if (debugElement) {
                debugElement.innerText = `【非同期エラー】\n${event.reason}`;
                debugElement.style.color = "#ff4444";
            }
        });
    </script>

    <script type="module">
        // スマホで一番安全に、確実に動く世界標準のインポート方式
        import { GestureRecognizer, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.js";

        const debugInfo = document.getElementById('debug-info');
        const video = document.getElementById('webcam');
        const startUI = document.getElementById('start-ui');
        const startBtn = document.getElementById('start-btn');

        let gestureRecognizer;
        let lastVideoTime = -1;
        let gestureHistory = [];

        function logStatus(message, percent = null, isError = false) {
            if (!debugInfo) return;
            if (percent !== null) {
                debugInfo.innerText = `[${percent}%] ${message}`;
            } else {
                debugInfo.innerText = message;
            }
            debugInfo.style.color = isError ? "#ff4444" : "#00ff00"; // 正常なら緑、エラーなら赤
        }

        // 初期化処理
        async function initARSystem() {
            logStatus("AIライブラリの読み込みに成功！", 20);

            try {
                logStatus("WASMエンジンをセットアップ中...", 55);
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
                );

                logStatus("AIモデル(約5MB)をダウンロード中...", 80);
                gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO"
                });

                logStatus("準備完了！ボタンを押してスタートしてください。", 100);
                startBtn.addEventListener('click', startCamera);

            } catch (error) {
                logStatus(`初期化失敗: ${error.message}`, null, true);
            }
        }

        // カメラ起動処理
        async function startCamera() {
            logStatus("カメラへの接続を要求中...");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } },
                    audio: false
                });
                video.srcObject = stream;
                
                startUI.style.display = 'none';
                logStatus("カメラ接続成功！手を出してください。");
                video.addEventListener('loadeddata', predictLoop);
            } catch (error) {
                logStatus(`カメラ起動エラー: アクセスが拒否されました。`, null, true);
            }
        }

        // ループ処理
        function predictLoop() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                try {
                    const results = gestureRecognizer.recognizeForVideo(video, performance.now());
                    let currentGesture = "None";
                    if (results.gestures && results.gestures.length > 0) {
                        currentGesture = results.gestures[0][0].categoryName;
                    }
                    updateDebounceAndCheckTrigger(currentGesture);
                } catch (err) {}
            }
            requestAnimationFrame(predictLoop);
        }

        // グー・パーの判定
        function updateDebounceAndCheckTrigger(currentGesture) {
            gestureHistory.push(currentGesture);
            if (gestureHistory.length > 5) gestureHistory.shift();

            let fistCount = 0;
            let maxConsecutiveFist = 0;
            for (let i = 0; i < gestureHistory.length - 1; i++) {
                if (gestureHistory[i] === "Closed_Fist") {
                    fistCount++;
                    if (fistCount > maxConsecutiveFist) maxConsecutiveFist = fistCount;
                } else {
                    fistCount = 0;
                }
            }

            if (maxConsecutiveFist >= 3 && currentGesture === "Open_Palm") {
                logStatus("【★恐竜召喚イベント発火！★】");
                debugInfo.style.color = "#ff00ff";
            } else {
                logStatus(`認識中の手: ${currentGesture}`);
            }
        }

        // システムを起動
        initARSystem();
    </script>
</body>
</html>
