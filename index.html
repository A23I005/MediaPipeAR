<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mediapipeAR - Smart Device Monitor Tracking</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        /* 各スマホのディスプレイ特性に合わせて object-fit をカバーに固定 */
        #webcam, #canvasOutput, #webgl-canvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover;
        }
        #canvasOutput { opacity: 0.8; z-index: 5; pointer-events: none; }
        #webgl-canvas { z-index: 10; pointer-events: none; }
        
        #ui-layer {
            position: absolute; z-index: 20; color: white; top: 20px; left: 20px;
            background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; pointer-events: none;
            font-size: 14px; line-height: 1.5;
        }
        #loading-ui {
            position: absolute; z-index: 30; color: white; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box; text-align: center;
        }
        button { padding: 14px 28px; font-size: 16px; border-radius: 5px; border: none; cursor: pointer; background: #007bff; color: white; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvasOutput"></canvas>
    <canvas id="webgl-canvas"></canvas>

    <div id="ui-layer">
        <div>Status: <span id="status" style="color:#00ff00;">Ready</span></div>
        <div>Monitor Scan: <span id="scan-result" style="font-weight:bold;">Scanning...</span></div>
    </div>

    <div id="loading-ui">
        <p id="loading-text">機種最適化・誤検出対策版モニターAR</p>
        <button id="start-btn">カメラを許可してスタート</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvasOutput = document.getElementById('canvasOutput');
        const ctxOutput = canvasOutput.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');
        const scanResultText = document.getElementById('scan-result');
        const loadingUi = document.getElementById('loading-ui');

        let scene, camera, renderer, boxMesh;

        // スマホの機種ごとの画角・画面サイズに合わせてThree.jsを完全にフィッティングさせる関数
        function initThree() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const aspect = width / height;

            scene = new THREE.Scene();
            
            // 機種の画面比率(aspect)を反映させてオブジェクトの歪みを完全に防止
            camera = new THREE.OrthographicCamera(
                -width / 2, width / 2, 
                height / 2, -height / 2, 
                0.1, 1000
            );
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), alpha: true });
            renderer.setSize(width, height);
            // レティナディスプレイ(iPhone等)や高画素Androidの比率に合わせる
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            const geometry = new THREE.BoxGeometry(60, 60, 60);
            const material = new THREE.MeshBasicMaterial({ color: 0xff3333 });
            boxMesh = new THREE.Mesh(geometry, material);
            boxMesh.visible = false;
            scene.add(boxMesh);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            camera.left = -width / 2;
            camera.right = width / 2;
            camera.top = height / 2;
            camera.bottom = -height / 2;
            camera.updateProjectionMatrix();
            
            renderer.setSize(width, height);
        }

        startBtn.addEventListener('click', async () => {
            loadingUi.style.display = 'none';
            initThree();

            try {
                // デバイスが対応している最大・最適な画質を自動で要求
                const constraints = {
                    video: { 
                        facingMode: "environment", 
                        width: { ideal: 1920, max: 3840 }, 
                        height: { ideal: 1080, max: 2160 } 
                    }
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                await video.play();

                canvasOutput.width = window.innerWidth;
                canvasOutput.height = window.innerHeight;

                statusText.innerText = "Tracking Active";
                requestAnimationFrame(trackMonitor);
            } catch (err) {
                console.error(err);
                alert("カメラ起動エラー: " + err.message);
            }
        });

        function trackMonitor() {
            if (video.readyState >= video.HAVE_CURRENT_DATA) {
                const screenWidth = window.innerWidth;
                const screenHeight = window.innerHeight;
                
                if(canvasOutput.width !== screenWidth) {
                    canvasOutput.width = screenWidth;
                    canvasOutput.height = screenHeight;
                }

                ctxOutput.clearRect(0, 0, screenWidth, screenHeight);
                ctxOutput.drawImage(video, 0, 0, screenWidth, screenHeight);

                const frame = ctxOutput.getImageData(0, 0, screenWidth, screenHeight);
                const data = frame.data;

                let minX = screenWidth, maxX = 0, minY = screenHeight, maxY = 0;
                let detectedPixels = 0;
                let totalBrightness = 0;
                let sampleCount = 0;

                const step = 8; 
                for (let y = 0; y < screenHeight; y += step) {
                    for (let x = 0; x < screenWidth; x += step) {
                        const idx = (y * screenWidth + x) * 4;
                        const r = data[idx];
                        const g = data[idx + 1];
                        const b = data[idx + 2];

                        const brightness = (r + g + b) / 3;
                        totalBrightness += brightness;
                        sampleCount++;

                        // モニターのベゼル（暗い枠）候補の抽出基準
                        if (brightness < 60 && Math.abs(r - g) < 12 && Math.abs(g - b) < 12) {
                            if (x < minX) minX = x;
                            if (x > maxX) maxX = x;
                            if (y < minY) minY = y;
                            if (y > maxY) maxY = y;
                            detectedPixels++;
                        }
                    }
                }

                // 画面全体の平均輝度を算出
                const avgScreenBrightness = totalBrightness / sampleCount;

                const areaWidth = maxX - minX;
                const areaHeight = maxY - minY;
                let isRealMonitor = false;

                // 【バグ修正】画面全体が真っ暗（平均輝度が45未満）な時は、誤認を完全に防止するためスキップ
                if (avgScreenBrightness > 45) {
                    
                    // 暗い四角形のサイズ検証
                    if (detectedPixels > 40 && areaWidth > 100 && areaHeight > 80) {
                        
                        // モニターの比率検証（横長であること）
                        const aspect = areaWidth / areaHeight;
                        if (aspect >= 1.2 && aspect <= 2.3) {
                            
                            // 中心点（画面内側）の輝度サンプリング
                            const cx = Math.floor(minX + areaWidth / 2);
                            const cy = Math.floor(minY + areaHeight / 2);
                            const centerIdx = (cy * screenWidth + cx) * 4;
                            
                            if (centerIdx < data.length) {
                                const cr = data[centerIdx];
                                const cg = data[centerIdx + 1];
                                const cb = data[centerIdx + 2];
                                const centerBrightness = (cr + cg + cb) / 3;

                                // 外枠が「暗く」、内側がしっかり「明るく光っている（輝度90以上）」場合のみ本物と断定
                                if (centerBrightness > 90) {
                                    isRealMonitor = true;
                                canvasOutput.height = screenHeight;
                                }
                            }
                        }
                    }
                }

                // 厳格な判定をパスした場合のみAR立方体を表示
                if (isRealMonitor) {
                    scanResultText.innerText = "Monitor Detected";
                    scanResultText.style.color = "#00ffff";

                    ctxOutput.strokeStyle = "#00ff00";
                    ctxOutput.lineWidth = 4;
                    ctxOutput.strokeRect(minX, minY, areaWidth, areaHeight);

                    const centerX = minX + (areaWidth / 2);
                    const centerY = minY + (areaHeight / 2);

                    const targetX = ((centerX / screenWidth) - 0.5) * screenWidth;
                    const targetY = (0.5 - (centerY / screenHeight)) * screenHeight;

                    // スムージング追従
                    boxMesh.position.x = 0.3 * targetX + 0.7 * boxMesh.position.x;
                    boxMesh.position.y = 0.3 * targetY + 0.7 * boxMesh.position.y;
                    boxMesh.visible = true;
                } else {
                    scanResultText.innerText = "Scanning Monitor...";
                    scanResultText.style.color = "#ff6b6b";
                    boxMesh.visible = false;
                }

                if (boxMesh.visible) {
                    boxMesh.rotation.x += 0.02;
                    boxMesh.rotation.y += 0.02;
                }
                renderer.render(scene, camera);
            }

            requestAnimationFrame(trackMonitor);
        }
    </script>
</body>
</html>
