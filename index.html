<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mediapipeAR - Multi-Monitor Matching</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #canvasOutput, #webgl-canvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover;
        }
        #canvasOutput { z-index: 5; }
        #webgl-canvas { z-index: 10; pointer-events: none; }
        
        #ui-layer {
            position: absolute; z-index: 20; color: white; top: 20px; left: 20px;
            background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; pointer-events: none;
            font-size: 14px; line-height: 1.5;
        }
        #loading-ui {
            position: absolute; z-index: 30; color: white; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box; text-align: center;
        }
        button { padding: 14px 28px; font-size: 16px; border-radius: 5px; border: none; cursor: pointer; background: #007bff; color: white; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline muted style="display:none;"></video>
    <canvas id="canvasOutput"></canvas>
    <canvas id="webgl-canvas"></canvas>

    <div id="ui-layer">
        <div>Status: <span id="status" style="color:#00ff00;">Ready</span></div>
        <div>Monitor Scan: <span id="scan-result" style="font-weight:bold;">Loading Templates...</span></div>
    </div>

    <div id="loading-ui">
        <p id="loading-text">個別モニター個別識別ARシステム</p>
        <button id="start-btn" disabled style="background:#555;">画像読み込み中...</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvasOutput = document.getElementById('canvasOutput');
        const ctxOutput = canvasOutput.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');
        const scanResultText = document.getElementById('scan-result');
        const loadingUi = document.getElementById('loading-ui');

        let scene, camera, renderer, boxMesh;
        let videoWidth = 1280;
        let videoHeight = 720;

        // モニター判定用テンプレートデータの格納先
        const templates = {
            monitor1: { src: 'monitor1.png', img: null, data: null, width: 64, height: 48 },
            monitor2: { src: 'monitor2.png', img: null, data: null, width: 64, height: 48 }
        };

        // 起動時に登録されたモニターの画像をバックグラウンドで解析・キャッシュする
        async function loadTemplates() {
            const hiddenCanvas = document.createElement('canvas');
            const hCtx = hiddenCanvas.getContext('2d');

            for (let key in templates) {
                const t = templates[key];
                t.img = new Image();
                t.img.src = t.src;
                await new Promise((resolve) => {
                    t.img.onload = () => {
                        // 処理軽量化のために小さなグリッドにリサイズして特徴量を抽出
                        hiddenCanvas.width = t.width;
                        hiddenCanvas.height = t.height;
                        hCtx.drawImage(t.img, 0, 0, t.width, t.height);
                        t.data = hCtx.getImageData(0, 0, t.width, t.height).data;
                        resolve();
                    };
                    t.img.onerror = () => {
                        console.warn(`${t.src} が見つかりません。ダミーデータを使用します。`);
                        resolve(); // 画像が片方なくてもエラー落ちを防ぐ
                    };
                });
            }
            startBtn.innerText = "カメラを許可してスタート";
            startBtn.disabled = false;
            startBtn.style.background = "#007bff";
            scanResultText.innerText = "Ready to Scan";
        }

        function initThree() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-width / 2, width / 2, height / 2, -height / 2, 0.1, 1000);
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), alpha: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            const geometry = new THREE.BoxGeometry(60, 60, 60);
            const material = new THREE.MeshBasicMaterial({ color: 0xff3333 });
            boxMesh = new THREE.Mesh(geometry, material);
            boxMesh.visible = false;
            scene.add(boxMesh);
        }

        startBtn.addEventListener('click', async () => {
            loadingUi.style.display = 'none';
            initThree();

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        videoWidth = video.videoWidth || 1280;
                        videoHeight = video.videoHeight || 720;
                        resolve();
                    };
                });
                await video.play();

                canvasOutput.width = videoWidth;
                canvasOutput.height = videoHeight;
                statusText.innerText = "Tracking Active";
                requestAnimationFrame(trackMonitor);
            } catch (err) {
                alert("カメラ起動エラー: " + err.message);
            }
        });

        // 2つの画像エリアがどれくらい似ているかを計算する関数 (テンプレートマッチング法)
        function comparePatch(frameData, startX, startY, patchWidth, patchHeight, templateData) {
            let score = 0;
            let count = 0;

            // 格子状にピクセルをサンプリングして高速に照合
            for (let y = 0; y < templates.monitor1.height; y += 2) {
                for (let x = 0; x < templates.monitor1.width; x += 2) {
                    const fx = Math.floor(startX + (x / templates.monitor1.width) * patchWidth);
                    const fy = Math.floor(startY + (y / templates.monitor1.height) * patchHeight);

                    if (fx >= videoWidth || fy >= videoHeight) continue;

                    const fIdx = (fy * videoWidth + fx) * 4;
                    const tIdx = (y * templates.monitor1.width + x) * 4;

                    // RGBそれぞれの差分(絶対値)を計算
                    const dR = Math.abs(frameData[fIdx] - templateData[tIdx]);
                    const dG = Math.abs(frameData[fIdx+1] - templateData[tIdx+1]);
                    const dB = Math.abs(frameData[fIdx+2] - templateData[tIdx+2]);

                    // 差が小さい（似ている）ほどスコアが高くなる
                    score += (255 * 3) - (dR + dG + dB);
                    count++;
                }
            }
            return count > 0 ? (score / count) / (255 * 3) : 0;
        }

        function trackMonitor() {
            if (video.readyState >= video.HAVE_CURRENT_DATA) {
                ctxOutput.drawImage(video, 0, 0, videoWidth, videoHeight);

                const frame = ctxOutput.getImageData(0, 0, videoWidth, videoHeight);
                const data = frame.data;

                // 1. まずは高速ピクセル走査で「モニターらしき四角い塊」の大枠の座標を見つける
                let minX = videoWidth, maxX = 0, minY = videoHeight, maxY = 0;
                let borderPixels = 0;

                const step = 16; 
                for (let y = 0; y < videoHeight; y += step) {
                    for (let x = 0; x < videoWidth; x += step) {
                        const idx = (y * videoWidth + x) * 4;
                        const brightness = (data[idx] + data[idx+1] + data[idx+2]) / 3;

                        // ベゼル枠の簡易スキャン
                        if (brightness < 65 && Math.abs(data[idx] - data[idx+1]) < 15) {
                            if (x < minX) minX = x; if (x > maxX) maxX = x;
                            if (y < minY) minY = y; if (y > maxY) maxY = y;
                            borderPixels++;
                        }
                    }
                }

                const areaWidth = maxX - minX;
                const areaHeight = maxY - minY;
                let activeMonitor = null;

                // 2. モニターらしき領域が確保できたら、登録画像とマッチング
                if (borderPixels > 20 && areaWidth > videoWidth * 0.25 && areaHeight > videoHeight * 0.25) {
                    
                    // モニター1のテンプレートと照合
                    let score1 = 0, score2 = 0;
                    if (templates.monitor1.data) {
                        score1 = comparePatch(data, minX, minY, areaWidth, areaHeight, templates.monitor1.data);
                    }
                    // モニター2のテンプレートと照合
                    if (templates.monitor2.data) {
                        score2 = comparePatch(data, minX, minY, areaWidth, areaHeight, templates.monitor2.data);
                    }

                    // 最もスコアが高く、かつ信頼度が70%以上のものを合格とする
                    if (score1 > score2 && score1 > 0.70) {
                        activeMonitor = "モニター1";
                    } else if (score2 > score1 && score2 > 0.70) {
                        activeMonitor = "モニター2";
                    }
                }

                // 3. 判定結果を画面に反映
                if (activeMonitor) {
                    scanResultText.innerText = `${activeMonitor} Detected`;
                    scanResultText.style.color = "#00ffff";

                    // 認識したモニターの外枠を強調描画
                    ctxOutput.strokeStyle = activeMonitor === "モニター1" ? "#00ff00" : "#ffaa00";
                    ctxOutput.lineWidth = 6;
                    ctxOutput.strokeRect(minX, minY, areaWidth, areaHeight);

                    // 3Dオブジェクトの位置調整
                    const centerX = minX + (areaWidth / 2);
                    const centerY = minY + (areaHeight / 2);
                    const screenWidth = window.innerWidth;
                    const screenHeight = window.innerHeight;

                    const targetX = ((centerX / videoWidth) - 0.5) * screenWidth;
                    const targetY = (0.5 - (centerY / videoHeight)) * screenHeight;

                    boxMesh.position.x = 0.3 * targetX + 0.7 * boxMesh.position.x;
                    boxMesh.position.y = 0.3 * targetY + 0.7 * boxMesh.position.y;
                    boxMesh.visible = true;
                } else {
                    scanResultText.innerText = "Scanning Monitor...";
                    scanResultText.style.color = "#ff6b6b";
                    boxMesh.visible = false;
                }

                if (boxMesh.visible) {
                    boxMesh.rotation.x += 0.02;
                    boxMesh.rotation.y += 0.02;
                }
                renderer.render(scene, camera);
            }

            requestAnimationFrame(trackMonitor);
        }

        // 起動時に自動で画像ロードを開始
        window.onload = loadTemplates;
    </script>
</body>
</html>
