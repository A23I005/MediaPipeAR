<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mediapipeAR - Custom GLB (Debug)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #webcam, #webgl-canvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover;
        }
        #webgl-canvas { pointer-events: none; z-index: 10; }
        #ui-layer {
            position: absolute; z-index: 20; color: white; top: 20px; left: 20px;
            background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; pointer-events: none;
            font-size: 14px; line-height: 1.5; max-width: 80vw;
        }
        /* 【追加】デバッグ表示用のスタイル（画面右上） */
        #debug-display {
            position: absolute; z-index: 25; top: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.8); color: #39ff14; padding: 10px 20px;
            border-radius: 5px; font-weight: bold; font-size: 16px;
            border: 2px solid #39ff14; pointer-events: none;
            display: none; /* 初期状態は非表示 */
        }
        #loading-ui {
            position: absolute; z-index: 30; color: white; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box; text-align: center;
        }
        button { padding: 14px 28px; font-size: 16px; border-radius: 5px; border: none; cursor: pointer; background: #007bff; color: white; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="webgl-canvas"></canvas>

    <div id="ui-layer">
        <div>Status: <span id="status" style="color:#00ff00;">Initializing AI...</span></div>
        <div>Gesture: <span id="gesture" style="font-weight:bold;">-</span></div>
    </div>

    <div id="debug-display">● 3Dモデル表示中</div>

    <div id="loading-ui">
        <p id="loading-text">AIモデルを読み込み中...</p>
        <button id="start-btn" style="display:none;">カメラを許可してARをスタート</button>
    </div>

    <script type="module">
        import { GestureRecognizer, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

        const video = document.getElementById('webcam');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');
        const gestureText = document.getElementById('gesture');
        const loadingUi = document.getElementById('loading-ui');
        const loadingText = document.getElementById('loading-text');
        // 【追加】要素の取得
        const debugDisplay = document.getElementById('debug-display');

        let gestureRecognizer;
        let scene, camera, renderer;
        
        // --- カスタムモデル用の変数 ---
        let customModel = null;
        const MODEL_BASE_SCALE = 24;
        const MODEL_SPAWN_SCALE = 0.5;
        
        const ALPHA = 0.3;
        let prevX = null;
        let prevY = null;

        let lastGesture = null;
        let isModelVisible = false;
        let spawnStartTime = 0;
        const SPAWN_DURATION = 220;

        function getModelUrl() {
            return './assets/ravjaa.glb';
        }

        function getPalmCenter(landmarks) {
            const palmIndices = [0, 5, 9, 13, 17];
            const sum = palmIndices.reduce((acc, index) => {
                const point = landmarks[index];
                if (!point) return acc;
                acc.x += point.x;
                acc.y += point.y;
                return acc;
            }, { x: 0, y: 0 });

            const count = palmIndices.filter((index) => landmarks[index]).length;
            return {
                x: sum.x / count,
                y: sum.y / count
            };
        }

        // AI初期化
        async function initMediaPipe() {
            try {
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
                );
                gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO"
                });
                
                loadingText.style.display = "none";
                startBtn.style.display = "block";
                statusText.innerText = "Ready";
            } catch (err) {
                console.error(err);
                loadingText.innerHTML = `AIの初期化に失敗しました。<br><br><span style="color:#ff6b6b; font-size:13px;">Error: ${err.message}</span>`;
            }
        }

        // Three.js初期化
        function initThree() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-width / 2, width / 2, height / 2, -height / 2, 0.1, 1000);
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), alpha: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // ライトの追加
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
            directionalLight.position.set(1, 1, 1).normalize();
            scene.add(directionalLight);

            // GLBモデルの読み込み
            const loader = new THREE.GLTFLoader();
            statusText.innerText = "3Dモデルを読み込み中...";

            if (window.location.protocol === 'file:') {
                statusText.innerHTML = '<span style="color:#ffdd57;">ファイル直接読み込みではGLBが制限されるため、HTTPサーバで開いてください。</span>';
            }

            const modelUrl = getModelUrl();
            loader.load(modelUrl, (gltf) => {
                customModel = gltf.scene;
                customModel.visible = false;
                customModel.scale.set(MODEL_BASE_SCALE, MODEL_BASE_SCALE, MODEL_BASE_SCALE);
                customModel.position.set(0, 0, 0);
                customModel.rotation.set(0, Math.PI, 0);
                scene.add(customModel);
                statusText.innerText = "モデル読込成功！ Tracking Active";
            }, undefined, (error) => {
                statusText.innerHTML = '<span style="color:red; font-weight:bold;">モデル読込エラー: GLBファイルが見つかりません。公開ディレクトリに ravjaa.glb があるか確認してください。</span>';
                console.error('モデルの読み込みエラー:', error);
            });
        }

        // スタートボタン
        startBtn.addEventListener('click', async () => {
            loadingUi.style.display = 'none';
            initThree();

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } } 
                });
                video.srcObject = stream;
                
                video.setAttribute('autoplay', '');
                video.setAttribute('muted', '');
                video.setAttribute('playsinline', '');
                
                await video.play();
                
                statusText.innerText = "Tracking Active";
                requestAnimationFrame(renderLoop);
            } catch (err) {
                console.error("カメラ起動エラー:", err);
                alert("カメラの起動に失敗しました: " + err.message);
            }
        });

        // 毎フレームのループ処理
        function renderLoop() {
            try {
                if (video.readyState < video.HAVE_CURRENT_DATA) {
                    gestureText.innerText = "Waiting video data...";
                    requestAnimationFrame(renderLoop);
                    return;
                }

                if (!gestureRecognizer) {
                    gestureText.innerText = "AI not ready in loop";
                    requestAnimationFrame(renderLoop);
                    return;
                }

                const now = performance.now();
                
                let results;
                try {
                    results = gestureRecognizer.recognizeForVideo(video, now);
                } catch (aiErr) {
                    gestureText.innerHTML = `<span style="color:#ff6b6b;">AI Error: ${aiErr.message}</span>`;
                    requestAnimationFrame(renderLoop);
                    return;
                }

                let currentGesture = "None";
                let handDetected = false;

                if (results && results.gestures && results.gestures.length > 0 && results.gestures[0].length > 0) {
                    currentGesture = results.gestures[0][0].categoryName || "None";
                    handDetected = true;
                }

                gestureText.innerText = currentGesture;

                if (handDetected && results.landmarks && results.landmarks.length > 0) {
                    const handLandmarks = results.landmarks[0];
                    const targetPoint = getPalmCenter(handLandmarks);

                    if (prevX === null || prevY === null) {
                        prevX = targetPoint.x;
                        prevY = targetPoint.y;
                    }
                    const smoothX = ALPHA * targetPoint.x + (1 - ALPHA) * prevX;
                    const smoothY = ALPHA * targetPoint.y + (1 - ALPHA) * prevY;
                    prevX = smoothX;
                    prevY = smoothY;

                    const width = window.innerWidth;
                    const height = window.innerHeight;

                    if (customModel) {
                        customModel.position.x = (smoothX - 0.5) * width;
                        customModel.position.y = (0.5 - smoothY) * height;
                        customModel.position.z = 0;

                        const gestureChangedToOpenPalm = currentGesture === "Open_Palm" && lastGesture !== "Open_Palm";
                        const gestureChangedToFist = (currentGesture === "Closed_Fist" || currentGesture === "None") && lastGesture !== currentGesture;

                        if (gestureChangedToOpenPalm) {
                            isModelVisible = true;
                            customModel.visible = true;
                            spawnStartTime = now;
                        } else if (gestureChangedToFist) {
                            isModelVisible = false;
                            customModel.visible = false;
                        }

                        if (isModelVisible) {
                            const elapsed = now - spawnStartTime;
                            const progress = Math.min(elapsed / SPAWN_DURATION, 1.0);
                            const currentScale = MODEL_BASE_SCALE * (MODEL_SPAWN_SCALE + (1 - MODEL_SPAWN_SCALE) * progress);
                            customModel.scale.set(currentScale, currentScale, currentScale);
                            customModel.rotation.y += 0.02;
                        }
                    }
                } else {
                    isModelVisible = false;
                    if (customModel) customModel.visible = false;
                    prevX = null;
                    prevY = null;
                }

                lastGesture = currentGesture;

                if (customModel && customModel.visible) {
                    debugDisplay.style.display = "block";
                } else {
                    debugDisplay.style.display = "none";
                }

                renderer.render(scene, camera);

            } catch (globalErr) {
                gestureText.innerHTML = `<span style="color:#ff6b6b;">Loop Error: ${globalErr.message}</span>`;
            }

            requestAnimationFrame(renderLoop);
        }
        
        initMediaPipe();
    </script>
</body>
</html>
