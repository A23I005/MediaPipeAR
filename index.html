<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mediapipeAR - Monitor Contour Tracking</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        /* カメラ、画像処理用、3D描画用のキャンバスを重ねる */
        #webcam, #canvasOutput, #webgl-canvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover;
        }
        #canvasOutput { opacity: 0.5; z-index: 5; pointer-events: none; } /* 検出線を重ねて表示 */
        #webgl-canvas { z-index: 10; pointer-events: none; }
        
        #ui-layer {
            position: absolute; z-index: 20; color: white; top: 20px; left: 20px;
            background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; pointer-events: none;
            font-size: 14px; line-height: 1.5;
        }
        #loading-ui {
            position: absolute; z-index: 30; color: white; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box; text-align: center;
        }
        button { padding: 14px 28px; font-size: 16px; border-radius: 5px; border: none; cursor: pointer; background: #007bff; color: white; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" id="opencv-js"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline muted style="display:none;"></video>
    <canvas id="canvasOutput"></canvas>
    <canvas id="webgl-canvas"></canvas>

    <div id="ui-layer">
        <div>Status: <span id="status" style="color:#ffcc00;">Loading OpenCV.js...</span></div>
        <div>Corners Found: <span id="corners-count" style="font-weight:bold;">0</span></div>
    </div>

    <div id="loading-ui">
        <p id="loading-text">画像処理システムを初期化中...</p>
        <button id="start-btn" style="display:none;">カメラを許可してモニター検出スタート</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvasOutput = document.getElementById('canvasOutput');
        const ctxOutput = canvasOutput.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');
        const cornersText = document.getElementById('corners-count');
        const loadingUi = document.getElementById('loading-ui');
        const loadingText = document.getElementById('loading-text');

        let scene, camera, renderer, boxMesh;
        let src, dst, gray, blurred, edged, contours, hierarchy;

        // OpenCV.jsの読み込み完了を待つ
        document.getElementById('opencv-js').addEventListener('load', () => {
            loadingText.style.display = "none";
            startBtn.style.display = "block";
            statusText.innerText = "OpenCV Ready";
            statusText.style.color = "#00ff00";
        });

        // Three.js初期化
        function initThree() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-width / 2, width / 2, height / 2, -height / 2, 0.1, 1000);
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), alpha: true });
            renderer.setSize(width, height);
            
            // モニターの中心に置く仮の赤い立方体
            const geometry = new THREE.BoxGeometry(50, 50, 50);
            const material = new THREE.MeshBasicMaterial({ color: 0xff3333 });
            boxMesh = new THREE.Mesh(geometry, material);
            boxMesh.visible = false;
            scene.add(boxMesh);
        }

        startBtn.addEventListener('click', async () => {
            loadingUi.style.display = 'none';
            initThree();

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 640, height: 480 } 
                });
                video.srcObject = stream;
                await video.play();

                // キャンバスサイズをカメラの解像度（640x480）に合わせる
                canvasOutput.width = 640;
                canvasOutput.height = 480;

                // OpenCVの画像格納用メモリ領域を確保
                src = new cv.Mat(480, 640, cv.CV_8UC4);
                dst = new cv.Mat(480, 640, cv.CV_8UC4);
                gray = new cv.Mat();
                blurred = new cv.Mat();
                edged = new cv.Mat();
                contours = new cv.PolyVector();
                hierarchy = new cv.Mat();

                statusText.innerText = "Tracking Active";
                requestAnimationFrame(processVideo);
            } catch (err) {
                console.error(err);
                alert("カメラ起動エラー: " + err.message);
            }
        });

        // 毎フレーム実行される画像処理＆描画ループ
        function processVideo() {
            if (video.readyState >= video.HAVE_CURRENT_DATA) {
                // 1. カメラ映像をOpenCVのMat形式オブジェクトにコピー
                ctxOutput.drawImage(video, 0, 0, 640, 480);
                src.data.set(ctxOutput.getImageData(0, 0, 640, 480).data);

                // 2. 画像処理（白黒化 -> ぼかしでノイズ除去 -> エッジ（輪郭）検出）
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
                cv.Canny(blurred, edged, 75, 200);

                // 3. 輪郭（塊）のリストを抽出
                cv.findContours(edged, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let maxArea = 0;
                let bestApprox = null;

                // 4. 抽出された全ての輪郭をループ処理し、「一番大きな四角形」を探す
                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);

                    // 小さすぎるノイズは無視
                    if (area > 5000) {
                        let approx = new cv.Mat();
                        let peri = cv.arcLength(cnt, true);
                        // 輪郭の直線を近似（ガタガタの線をまっすぐに直す）
                        cv.approxPolyDP(cnt, approx, 0.02 * peri, true);

                        // 近似した結果、頂点数が「4つ（＝四角形）」であり、かつこれまでの最大サイズなら保持
                        if (approx.rows === 4 && area > maxArea) {
                            maxArea = area;
                            if (bestApprox) bestApprox.delete();
                            bestApprox = approx;
                        } else {
                            approx.delete();
                        }
                    }
                }

                // 5. モニター（四角形）が見つかった場合の処理
                if (bestApprox) {
                    cornersText.innerText = "4 (Monitor Detected)";
                    cornersText.style.color = "#00ffff";

                    // 4隅の座標を取得
                    let p1 = { x: bestApprox.data32S[0], y: bestApprox.data32S[1] };
                    let p2 = { x: bestApprox.data32S[2], y: bestApprox.data32S[3] };
                    let p3 = { x: bestApprox.data32S[4], y: bestApprox.data32S[5] };
                    let p4 = { x: bestApprox.data32S[6], y: bestApprox.data32S[7] };

                    // 画面上に検出した四角形の線を引く
                    ctxOutput.strokeStyle = "#00ff00";
                    ctxOutput.lineWidth = 4;
                    ctxOutput.beginPath();
                    ctxOutput.moveTo(p1.x, p1.y);
                    ctxOutput.lineTo(p2.x, p2.y);
                    ctxOutput.lineTo(p3.x, p3.y);
                    ctxOutput.lineTo(p4.x, p4.y);
                    ctxOutput.closePath();
                    ctxOutput.stroke();

                    // 4隅の中心（重心）を計算してそこに3Dモデルを配置
                    let centerX = (p1.x + p2.x + p3.x + p4.x) / 4;
                    let centerY = (p1.y + p2.y + p3.y + p4.y) / 4;

                    // OpenCVの640x480座標系から、ブラウザの画面サイズにマッピング
                    const screenWidth = window.innerWidth;
                    const screenHeight = window.innerHeight;
                    
                    // 座標をThree.jsの空間に変換
                    boxMesh.position.x = ((centerX / 640) - 0.5) * screenWidth;
                    boxMesh.position.y = (0.5 - (centerY / 480)) * screenHeight;
                    boxMesh.visible = true;

                    bestApprox.delete();
                } else {
                    cornersText.innerText = "0 (Scanning...)";
                    cornersText.style.color = "#ff6b6b";
                    boxMesh.visible = false;
                }

                // 3Dシーンのレンダリング
                if (boxMesh.visible) {
                    boxMesh.rotation.x += 0.02;
                    boxMesh.rotation.y += 0.02;
                }
                renderer.render(scene, camera);
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
