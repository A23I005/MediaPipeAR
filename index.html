<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mediapipeAR - Balanced Monitor Tracking</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #canvasOutput, #webgl-canvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover;
        }
        #canvasOutput { z-index: 5; }
        #webgl-canvas { z-index: 10; pointer-events: none; }
        
        #ui-layer {
            position: absolute; z-index: 20; color: white; top: 20px; left: 20px;
            background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; pointer-events: none;
            font-size: 14px; line-height: 1.5;
        }
        #loading-ui {
            position: absolute; z-index: 30; color: white; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box; text-align: center;
        }
        button { padding: 14px 28px; font-size: 16px; border-radius: 5px; border: none; cursor: pointer; background: #007bff; color: white; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline muted style="display:none;"></video>
    <canvas id="canvasOutput"></canvas>
    <canvas id="webgl-canvas"></canvas>

    <div id="ui-layer">
        <div>Status: <span id="status" style="color:#00ff00;">Ready</span></div>
        <div>Monitor Scan: <span id="scan-result" style="font-weight:bold;">Analyzing Templates...</span></div>
    </div>

    <div id="loading-ui">
        <p id="loading-text">バランス最適化フィルタ搭載・モニターAR</p>
        <button id="start-btn" disabled style="background:#555;">画像データを解析中...</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvasOutput = document.getElementById('canvasOutput');
        const ctxOutput = canvasOutput.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');
        const scanResultText = document.getElementById('scan-result');
        const loadingUi = document.getElementById('loading-ui');

        let scene, camera, renderer, boxMesh;
        let videoWidth = 1280;
        let videoHeight = 720;

        const cb = Date.now();
        const templates = {
            monitor1: { src: 'monitor1.png?cb=' + cb, avgR: 0, avgG: 0, avgB: 0, isLoaded: false },
            monitor2: { src: 'monitor2.png?cb=' + cb, avgR: 0, avgG: 0, avgB: 0, isLoaded: false }
        };

        async function analyzeTemplates() {
            const hiddenCanvas = document.createElement('canvas');
            const hCtx = hiddenCanvas.getContext('2d');

            for (let key in templates) {
                const t = templates[key];
                const img = new Image();
                img.src = t.src;
                await new Promise((resolve) => {
                    img.onload = () => {
                        hiddenCanvas.width = 50;
                        hiddenCanvas.height = 50;
                        hCtx.drawImage(img, 0, 0, 50, 50);
                        const imgData = hCtx.getImageData(0, 0, 50, 50).data;
                        
                        let rSum = 0, gSum = 0, bSum = 0, count = 0;
                        for(let i=0; i<imgData.length; i+=4) {
                            rSum += imgData[i];
                            gSum += imgData[i+1];
                            bSum += imgData[i+2];
                            count++;
                        }
                        t.avgR = rSum / count;
                        t.avgG = gSum / count;
                        t.avgB = bSum / count;
                        t.isLoaded = true;
                        resolve();
                    };
                    img.onerror = () => {
                        console.warn(t.src + " をスキップ");
                        resolve();
                    };
                });
            }
            startBtn.innerText = "カメラを許可してAR起動";
            startBtn.disabled = false;
            startBtn.style.background = "#007bff";
            scanResultText.innerText = "Scanning Active";
        }

        function initThree() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-width / 2, width / 2, height / 2, -height / 2, 0.1, 1000);
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), alpha: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            const geometry = new THREE.BoxGeometry(60, 60, 60);
            const material = new THREE.MeshBasicMaterial({ color: 0xff3333 });
            boxMesh = new THREE.Mesh(geometry, material);
            boxMesh.visible = false;
            scene.add(boxMesh);
        }

        startBtn.addEventListener('click', async () => {
            loadingUi.style.display = 'none';
            initThree();

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        videoWidth = video.videoWidth || 1280;
                        videoHeight = video.videoHeight || 720;
                        resolve();
                    };
                });
                await video.play();

                canvasOutput.width = videoWidth;
                canvasOutput.height = videoHeight;
                statusText.innerText = "Tracking Active";
                requestAnimationFrame(trackMonitor);
            } catch (err) {
                alert("カメラエラー: " + err.message);
            }
        });

        function trackMonitor() {
            if (video.readyState >= video.HAVE_CURRENT_DATA) {
                ctxOutput.drawImage(video, 0, 0, videoWidth, videoHeight);

                const frame = ctxOutput.getImageData(0, 0, videoWidth, videoHeight);
                const data = frame.data;

                // スキャンエリアを広めに戻し、斜めのカメラワークに対応
                const startX = Math.floor(videoWidth * 0.05);
                const endX = Math.floor(videoWidth * 0.95);
                const startY = Math.floor(videoHeight * 0.05);
                const endY = Math.floor(videoHeight * 0.95);

                let minX = videoWidth, maxX = 0, minY = videoHeight, maxY = 0;
                let validPoints = 0;

                const step = 6; 
                for (let y = startY; y < endY; y += step) {
                    for (let x = startX; x < endX; x += step) {
                        const idx = (y * videoWidth + x) * 4;
                        
                        const rightIdx = (y * videoWidth + (x + 3)) * 4;
                        const downIdx = ((y + 3) * videoWidth + x) * 4;

                        if (rightIdx >= data.length || downIdx >= data.length) continue;

                        const bCurrent = (data[idx] + data[idx+1] + data[idx+2]) / 3;
                        const bRight = (data[rightIdx] + data[rightIdx+1] + data[rightIdx+2]) / 3;
                        const bDown = (data[downIdx] + data[downIdx+1] + data[downIdx+2]) / 3;

                        const edgeX = Math.abs(bCurrent - bRight);
                        const edgeY = Math.abs(bCurrent - bDown);

                        // 閾値を30から18に落とし、暗めの環境や斜めでもエッジを拾えるように緩和
                        if (edgeX > 18 || edgeY > 18) {
                            if (x < minX) minX = x; if (x > maxX) maxX = x;
                            if (y < minY) minY = y; if (y > maxY) maxY = y;
                            validPoints++;
                        }
                    }
                }

                let areaWidth = maxX - minX;
                let areaHeight = maxY - minY;
                let identifiedMonitor = null;

                // 十分なエッジポイントが存在し、ある程度の大きさがある場合のみ処理
                if (validPoints > 25 && areaWidth > videoWidth * 0.2 && areaHeight > videoHeight * 0.12) {
                    const aspectRatio = areaWidth / areaHeight;

                    // 斜めから撮影したときの歪みを考慮し、比率制限を 1.0 〜 2.5 に広げる
                    if (aspectRatio >= 1.0 && aspectRatio <= 2.5) {
                        
                        const cx = Math.floor(minX + areaWidth / 2);
                        const cy = Math.floor(minY + areaHeight / 2);
                        const centerIdx = (cy * videoWidth + cx) * 4;

                        if (centerIdx < data.length) {
                            const currentR = data[centerIdx];
                            const currentG = data[centerIdx+1];
                            const currentB = data[centerIdx+2];

                            let bestMatch = null;
                            let minDiff = 999999;

                            for (let key in templates) {
                                const t = templates[key];
                                if (!t.isLoaded) continue;

                                const diff = Math.abs(currentR - t.avgR) + Math.abs(currentG - t.avgG) + Math.abs(currentB - t.avgB);
                                if (diff < minDiff) {
                                    minDiff = diff;
                                    bestMatch = key;
                                }
                            }

                            // 色の許容範囲を130に調整（BenQモニターの環境光による変化を吸収）
                            if (bestMatch && minDiff < 130) {
                                identifiedMonitor = bestMatch === "monitor1" ? "モニター1" : "モニター2";
                            }
                        }
                    }
                }

                if (identifiedMonitor) {
                    scanResultText.innerText = identifiedMonitor + " Detected";
                    scanResultText.style.color = "#00ffff";

                    ctxOutput.strokeStyle = identifiedMonitor === "モニター1" ? "#00ff00" : "#ffaa00";
                    ctxOutput.lineWidth = 5;
                    ctxOutput.strokeRect(minX, minY, areaWidth, areaHeight);

                    const centerX = minX + (areaWidth / 2);
                    const centerY = minY + (areaHeight / 2);
                    const screenWidth = window.innerWidth;
                    const screenHeight = window.innerHeight;

                    const targetX = ((centerX / videoWidth) - 0.5) * screenWidth;
                    const targetY = (0.5 - (centerY / videoHeight)) * screenHeight;

                    boxMesh.position.x = 0.3 * targetX + 0.7 * boxMesh.position.x;
                    boxMesh.position.y = 0.3 * targetY + 0.7 * boxMesh.position.y;
                    boxMesh.visible = true;
                } else {
                    scanResultText.innerText = "Scanning Monitor...";
                    scanResultText.style.color = "#ff6b6b";
                    boxMesh.visible = false;
                }

                if (boxMesh.visible) {
                    boxMesh.rotation.x += 0.02;
                    boxMesh.rotation.y += 0.02;
                }
                renderer.render(scene, camera);
            }

            requestAnimationFrame(trackMonitor);
        }

        window.onload = analyzeTemplates;
    </script>
</body>
</html>
